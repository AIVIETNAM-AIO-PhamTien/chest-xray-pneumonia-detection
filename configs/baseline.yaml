seed: 42

data:
  root_dir: "data/raw/chest_xray"
  image_size: 224
  batch_size: 32
  num_workers: 2

model:
  backbone: "resnet18"
  pretrained: true
  num_classes: 2
  freeze_backbone: false

train:
  epochs: 10
  lr: 0.0001
  weight_decay: 0.00001
  optimizer: "adam"
  device: "cuda"

output:
  checkpoint_dir: "models"
  log_dir: "outputs/logs"
